name: stock-check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install yfinance pandas

      - name: Run script
        run: python okta_check.py
